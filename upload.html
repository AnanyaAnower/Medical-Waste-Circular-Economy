<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waste Logging - Circular Economy Ledger</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border-radius: 15px; border: none; }
        .btn-success { background-color: #28a745; border: none; border-radius: 8px; }
        .btn-success:hover { background-color: #218838; }
        .form-label { font-weight: 600; color: #444; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card p-4 shadow">
                <h3 class="mb-4 text-center">Medical Waste Entry</h3>
                
                <div class="mb-3">
                    <label class="form-label">Hospital/Institution Name</label>
                    <input type="text" id="hospitalName" class="form-control" placeholder="e.g. Dhaka Medical College">
                </div>

                <div class="mb-3">
                    <label class="form-label">Logged By (Staff Name)</label>
                    <input type="text" id="staffName" class="form-control" placeholder="Enter your name">
                </div>

                <hr>

                <div class="mb-3">
                    <label class="form-label">Select Ward/Department</label>
                    <select id="wardSelect" class="form-select">
                        <option value="Emergency">Emergency</option>
                        <option value="ICU">ICU</option>
                        <option value="Radiology">Radiology</option>
                        <option value="Operation Theater">Operation Theater</option>
                        <option value="General Ward">General Ward</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Waste Item (Detected by AI)</label>
                    <select id="itemSelect" class="form-select">
                        <option value="Saline Bag">Saline Bag (Plastic)</option>
                        <option value="Syringe">Syringe (PP Plastic)</option>
                        <option value="Dialysis Kit">Dialysis Kit (Mixed)</option>
                        <option value="IV Set">IV Set (Tubing)</option>
                    </select>
                </div>

                <button onclick="logToLedger()" class="btn btn-success w-100 py-2 fw-bold">Verify & Log to Ledger</button>
                
                <div id="statusMsg" class="mt-3 text-center text-success fw-bold" style="display:none;">
                    Data Synced to Central Ledger!
                </div>
            </div>
            
            <p class="mt-4 text-center text-muted small">
                © 2026 Ananya Anower - BUET Thesis Project<br>
                Centralized Ledger for Dhaka Medical Waste
            </p>
        </div>
    </div>
</div>

<script>
    // --- REPLACE THIS SECTION WITH YOUR ACTUAL FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "medical-waste-circular-economy.firebaseapp.com",
        databaseURL: "https://medical-waste-circular-economy-default-rtdb.firebaseio.com/",
        projectId: "medical-waste-circular-economy",
        storageBucket: "medical-waste-circular-economy.firebasestorage.app",
        messagingSenderId: "180545712948",
        appId: "1:180545712948:web:3e93c730afcf6306c7eb61",
        measurementId: "G-G49S8FGXDV"
    };
    // -------------------------------------------------------------

    // Initialize Firebase
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }

    function logToLedger() {
        const hospital = document.getElementById('hospitalName').value;
        const staff = document.getElementById('staffName').value;
        const ward = document.getElementById('wardSelect').value;
        const item = document.getElementById('itemSelect').value;
        
        // Automated Timestamping
        const now = new Date();
        const timestamp = now.toLocaleString(); // Captures local date and time

        // Basic validation
        if(hospital.trim() === "" || staff.trim() === "") {
            alert("Please provide Hospital and Staff names to ensure data traceability.");
            return;
        }

        const logEntry = {
            hospital: hospital,
            staff: staff,
            ward: ward,
            item: item,
            timestamp: timestamp,
            status: "Verified",
            region: "Dhaka" // Context for your thesis
        };

        // Push to Realtime Database
        firebase.database().ref('wasteLogs').push(logEntry)
        .then(() => {
            // Visual feedback
            const status = document.getElementById('statusMsg');
            status.style.display = 'block';
            
            // Clear name fields after successful entry if needed
            // document.getElementById('staffName').value = ""; 

            setTimeout(() => { 
                status.style.display = 'none'; 
            }, 3000);
        })
        .catch((error) => {
            console.error("Sync Error: ", error);
            alert("Sync failed. Check internet connection.");
        });
    }
</script>

</body>
</html>
