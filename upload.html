<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Waste Scanner - Circular Economy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Inter', sans-serif; }
        .scanner-card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        #webcam-container { background: #000; border-radius: 15px; overflow: hidden; position: relative; margin-bottom: 20px; min-height: 300px; }
        #webcam-container canvas { width: 100% !important; height: auto !important; }
        .reward-badge { background: #e8f5e9; color: #2e7d32; padding: 15px; border-radius: 12px; border-left: 5px solid #2e7d32; }
    </style>
</head>
<body class="p-3">

    <div class="container" style="max-width: 500px;">
        <div id="step-1" class="card p-4 scanner-card">
            <h4 class="fw-bold mb-3">Staff Identification</h4>
            <div class="mb-3">
                <label class="form-label small fw-bold">Select Hospital</label>
                <select id="hospitalName" class="form-select">
                    <option value="Dhaka Medical College & Hospital">Dhaka Medical College & Hospital</option>
                    <option value="BSMMU">Bangabandhu Sheikh Mujib Medical University (BSMMU)</option>
                    <option value="Mitford">Sir Salimullah Medical College & Mitford Hospital</option>
                    <option value="Suhrawardy">Shaheed Suhrawardy Medical College & Hospital</option>
                    <option value="Chattogram MC">Chattogram Medical College Hospital</option>
                    <option value="Rajshahi MC">Rajshahi Medical College Hospital</option>
                    <option value="Mymensingh MC">Mymensingh Medical College Hospital</option>
                    <option value="Sylhet MAG Osmani">Sylhet MAG Osmani Medical College Hospital</option>
                    <option value="Sher-e-Bangla MC">Sher-e-Bangla Medical College Hospital (Barishal)</option>
                    <option value="Rangpur MC">Rangpur Medical College Hospital</option>
                    <option value="Evercare">Evercare Hospital Dhaka</option>
                    <option value="Square">Square Hospital</option>
                    <option value="United">United Hospital Limited</option>
                    <option value="Labaid">Labaid Specialized Hospital</option>
                    <option value="BIRDEM">BIRDEM General Hospital</option>
                    <option value="Ibn Sina">Ibn Sina Specialized Hospital</option>
                    <option value="Bangladesh MC">Bangladesh Medical College & Hospital</option>
                    <option value="Holy Family">Holy Family Red Crescent Medical College & Hospital</option>
                    <option value="Enam MC">Enam Medical College & Hospital</option>
                    <option value="Anwer Khan Modern">Anwer Khan Modern Medical College Hospital</option>
                    <option value="CHRF">CHRF</option>
                    <option value="icddr,b">icddr,b</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">Staff Name</label>
                <input type="text" id="staffName" class="form-control" placeholder="Enter your name">
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">Ward/Department</label>
                <select id="ward" class="form-select">
                    <option value="" selected disabled>Select Ward</option>
                    <option value="ICU">ICU</option>
                    <option value="Emergency">Emergency</option>
                    <option value="Radiology">Radiology</option>
                    <option value="General Ward">General Ward</option>
                    <option value="Operating Theater">Operating Theater</option>
                    <option value="Nephrology">Nephrology</option>
                    <option value="Oncology">Oncology</option>
                    <option value="Cardiology">Cardiology</option>
                    <option value="Pediatrics">Pediatrics</option>
                    <option value="Outpatient">Outpatient (OPD)</option>
                </select>
            </div>
            <button class="btn btn-primary w-100 py-3 fw-bold" onclick="startScanner()">START AI SCANNER</button>
        </div>

        <div id="step-2" class="card p-4 scanner-card d-none">
            <h5 class="fw-bold mb-3 text-center">Scan Medical Waste</h5>
            <div id="webcam-container"></div>
            <div id="label-container" class="text-center mb-3"></div>
            <button id="nextBtn" class="btn btn-success w-100 py-3 fw-bold d-none" onclick="goToReward()">PROCEED TO REWARD</button>
        </div>

        <div id="step-3" class="card p-4 scanner-card d-none">
            <h5 class="fw-bold mb-4">Calculate Circular Reward</h5>
            <div class="mb-3">
                <label class="form-label small fw-bold">Recyclable Category</label>
                <select id="finalItem" class="form-select" onchange="calculate()">
                    <option value="Saline Bag">Saline Bag (Plastic)</option>
                    <option value="IV Tube">IV Tube (Plastic)</option>
                    <option value="Plastic Bottle">Plastic Bottle</option>
                    <option value="Paper & Cardboard">Paper & Cardboard</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">Quantity (Units/Kg)</label>
                <input type="number" id="quantity" class="form-control" value="1" oninput="calculate()">
            </div>
            <div class="reward-badge mb-4">
                <div class="d-flex justify-content-between">
                    <span>Market Value:</span>
                    <span class="fw-bold">৳ <span id="valRevenue">0.00</span></span>
                </div>
                <div class="d-flex justify-content-between mt-2">
                    <span class="fw-bold">Your Profit Share:</span>
                    <span class="fw-bold" style="font-size: 1.2rem;">৳ <span id="valReward">0.00</span></span>
                </div>
            </div>
            <button class="btn btn-primary w-100 py-3 fw-bold" onclick="submitLog()">LOG TO LEDGER</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDL0488_Y22MMpiaz0xKAEweLdaOacrA1o",
            authDomain: "medical-waste-circular-economy.firebaseapp.com",
            databaseURL: "https://medical-waste-circular-economy-default-rtdb.firebaseio.com/",
            projectId: "medical-waste-circular-economy",
            storageBucket: "medical-waste-circular-economy.firebasestorage.app",
            messagingSenderId: "180545712948",
            appId: "1:180545712948:web:3e93c730afcf6306c7eb61",
            measurementId: "G-G49S8FGXDV"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const MODEL_A_URL = "https://teachablemachine.withgoogle.com/models/RghMeODeQ/";
        const MODEL_B_URL = "https://teachablemachine.withgoogle.com/models/hUQ-SIjKT/";

        let modelA, modelB, webcam, labelContainer, maxPredictionsA, maxPredictionsB;
        let currentBestMatch = ""; 
        let isPreviewing = true; 
        let modelsLoaded = false;

        // FIXED: Re-added the Price List
        const wasteRates = {
            "saline bag": { market: 5.50, rewardPct: 0.20 },
            "iv tube": { market: 3.00, rewardPct: 0.15 },
            "plastic bottle": { market: 2.50, rewardPct: 0.10 },
            "paper & cardboard": { market: 3.50, rewardPct: 0.12 }
        };

        async function preloadModels() {
            try {
                const [loadedA, loadedB] = await Promise.all([
                    tmImage.load(MODEL_A_URL + "model.json", MODEL_A_URL + "metadata.json"),
                    tmImage.load(MODEL_B_URL + "model.json", MODEL_B_URL + "metadata.json")
                ]);
                modelA = loadedA; modelB = loadedB;
                maxPredictionsA = modelA.getTotalClasses();
                maxPredictionsB = modelB.getTotalClasses();
                modelsLoaded = true;
            } catch (e) { console.error("Load failed", e); }
        }
        preloadModels();

        async function startScanner() {
            if(!document.getElementById('staffName').value || !document.getElementById('ward').value) {
                alert("Please fill in your name and select a ward."); return;
            }
            document.getElementById('step-1').classList.add('d-none');
            document.getElementById('step-2').classList.remove('d-none');
            labelContainer = document.getElementById("label-container");

            webcam = new tmImage.Webcam(400, 400, false); 
            await webcam.setup({ facingMode: "environment" }); 
            await webcam.play();
            document.getElementById("webcam-container").appendChild(webcam.canvas);

            if (!modelsLoaded) labelContainer.innerHTML = "Finalizing AI Models...";
            while (!modelsLoaded) { await new Promise(r => setTimeout(r, 500)); }
            resetCapture();
        }

        async function previewLoop() {
            if(isPreviewing) { webcam.update(); window.requestAnimationFrame(previewLoop); }
        }

        async function captureAndPredict() {
            isPreviewing = false;
            labelContainer.innerHTML = "Analyzing...";
            const predictionA = await modelA.predict(webcam.canvas);
            let topA = ""; let probA = 0;
            for (let i = 0; i < maxPredictionsA; i++) {
                if(predictionA[i].probability > probA) { probA = predictionA[i].probability; topA = predictionA[i].className; }
            }

            if (topA === "Hazardous" && probA > 0.85) {
                labelContainer.innerHTML = `
                    <div class="p-3 bg-danger text-white rounded mb-2">⚠️ HAZARDOUS DETECTED</div>
                    <button class="btn btn-outline-secondary w-100 mb-2" onclick="resetCapture()">Try Again</button>
                    <button class="btn btn-sm btn-link" onclick="forceRecyclable()">If Recyclable tap here</button>`;
            } else { runDetailer(); }
        }

        async function runDetailer() {
            labelContainer.innerHTML = "Identifying...";
            const predictionB = await modelB.predict(webcam.canvas);
            let topB = ""; let probB = 0;
            for (let j = 0; j < maxPredictionsB; j++) {
                if(predictionB[j].probability > probB) { probB = predictionB[j].probability; topB = predictionB[j].className; }
            }
            currentBestMatch = topB;
            labelContainer.innerHTML = `<div class="p-3 bg-success text-white rounded mb-2">✅ ${topB} Detected</div>
                <button class="btn btn-outline-primary w-100" onclick="resetCapture()">Retake Photo</button>`;
            document.getElementById('nextBtn').classList.remove('d-none');
        }

        function forceRecyclable() { runDetailer(); }
        function resetCapture() {
            isPreviewing = true;
            document.getElementById('nextBtn').classList.add('d-none');
            labelContainer.innerHTML = `<button class="btn btn-warning w-100 fw-bold py-3" onclick="captureAndPredict()">📸 TAKE PICTURE</button>`;
            window.requestAnimationFrame(previewLoop);
        }

        function goToReward() {
            webcam.stop();
            document.getElementById('step-2').classList.add('d-none');
            document.getElementById('step-3').classList.remove('d-none');
            // Select the item in the dropdown that matches the AI result
            const select = document.getElementById('finalItem');
            for(let i=0; i<select.options.length; i++) {
                if(select.options[i].value.toLowerCase().includes(currentBestMatch.toLowerCase())) {
                    select.selectedIndex = i; break;
                }
            }
            calculate();
        }

        function calculate() {
    // 1. Get the raw value from the dropdown/AI
    const rawItem = document.getElementById('finalItem').value;
    
    // 2. Clean the string: lowercase it and remove extra info like "(Plastic)"
    // This turns "Saline Bag (Plastic)" into "saline bag"
    const lookupKey = rawItem.toLowerCase().split(' (')[0].trim();
    
    const qty = parseInt(document.getElementById('quantity').value) || 0;
    
    // 3. Strict lookup with a 0-value fallback to alert you if something is wrong
    const rates = wasteRates[lookupKey];
    
    if (rates) {
        const rev = qty * rates.market;
        document.getElementById('valRevenue').innerText = rev.toFixed(2);
        document.getElementById('valReward').innerText = (rev * rates.rewardPct).toFixed(2);
    } else {
        // Fallback if the AI finds something not in your price list
        console.warn("No rate found for:", lookupKey);
        document.getElementById('valRevenue').innerText = "0.00";
        document.getElementById('valReward').innerText = "0.00";
    }
}

        function submitLog() {
            const staff = document.getElementById('staffName').value;
            const item = document.getElementById('finalItem').value;
            const reward = document.getElementById('valReward').innerText;
            
            const logEntry = {
                timestamp: new Date().toLocaleString(),
                hospital: document.getElementById('hospitalName').value,
                ward: document.getElementById('ward').value,
                staff: staff,
                item: item,
                value: document.getElementById('valRevenue').innerText,
                reward: reward,
                status: "Verified"
            };

            db.ref('wasteLedger').push(logEntry).then(() => { showSuccessPopup(staff, item, reward); });
        }

        function showSuccessPopup(staff, item, reward) {
            const overlay = document.createElement('div');
            overlay.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; z-index:9999; padding:20px;";
            overlay.innerHTML = `
                <div class="card p-4 text-center shadow-lg" style="max-width:400px; border-radius:20px; background:white;">
                    <span style="font-size: 50px;">🎉</span>
                    <h3 class="text-success fw-bold">Logged to Cloud!</h3>
                    <p class="text-muted">Reward earned for ${item}.</p>
                    <div class="p-3 mb-3" style="background:#e8f5e9; border-radius:15px;">
                        <h2 class="text-success mb-0">৳ ${reward}</h2>
                    </div>
                    <button class="btn btn-primary btn-lg w-100" onclick="location.reload()">Scan Next Item</button>
                </div>`;
            document.body.appendChild(overlay);
        }
    </script>
</body>
</html>
