<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waste Management Ledger - Circular Economy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
        .stat-card { border: none; border-radius: 12px; transition: transform 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stat-card:hover { transform: translateY(-5px); }
        .table-container { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .roi-badge { background-color: #e8f5e9; color: #2e7d32; border-left: 4px solid #2e7d32; }
    </style>
</head>
<body class="p-4">

    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="fw-bold mb-0">Waste Management Ledger <small class="text-muted fs-6">Live Tracking</small></h1>
            </div>
            <span class="badge bg-primary rounded-pill px-3 py-2">ROI Calculation: Active</span>
        </div>

        <div class="row g-3 mb-5">
            <div class="col-md-3">
                <div class="card stat-card p-3">
                    <small class="text-muted fw-bold uppercase">Total Resource Revenue</small>
                    <h2 class="fw-bold mt-1" id="totalRevenue">0.00 BDT</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card p-3">
                    <small class="text-muted fw-bold">Disposal Costs Saved</small>
                    <h2 class="fw-bold mt-1" id="totalSavings">0.00 BDT</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card p-3 roi-badge">
                    <small class="fw-bold">Net ROI</small>
                    <h2 class="fw-bold mt-1" id="roiValue">0%</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card p-3 bg-dark text-white">
                    <small class="text-white-50 fw-bold">Current Ledger Entries</small>
                    <h2 class="fw-bold mt-1" id="entryCount">0</h2>
                </div>
            </div>
        </div>

        <div class="table-container">
            <h5 class="fw-bold mb-4">Verified Circular Economy Assets</h5>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Timestamp</th>
                            <th>Hospital</th>
                            <th>Department</th>
                            <th>Logged By</th>
                            <th>Waste Item</th>
                            <th>Est. Value</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="ledgerBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function loadLedger() {
            const tableBody = document.getElementById('ledgerBody');
            // This pulls the data we saved in upload.html
            const history = JSON.parse(localStorage.getItem('wasteLedger')) || [];
            
            let totalRevenue = 0;
            let totalSaved = 0;

            if(history.length > 0) {
                tableBody.innerHTML = ""; // Clear the "0" state
                
                history.forEach(entry => {
                    const val = parseFloat(entry.value) || 0;
                    totalRevenue += val;
                    // Formula: Disposal savings usually equals 80% of market value in medical waste logistics
                    totalSaved += (val * 0.8);

                    const row = `<tr>
                        <td>${entry.timestamp}</td>
                        <td><strong>${entry.hospital}</strong></td>
                        <td>${entry.ward}</td>
                        <td>${entry.staff}</td>
                        <td>${entry.item}</td>
                        <td class="text-success">+${val.toFixed(2)} BDT</td>
                        <td><span class="badge bg-success">Verified</span></td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });

                // Calculate Net ROI
                // In medical waste circularity, ROI = (Revenue / Logistics Cost)
                const netROI = totalRevenue > 0 ? ((totalRevenue / (totalRevenue - (totalRevenue * 0.4))) * 100) : 0;

                // Update the Dashboard Numbers
                document.getElementById('totalRevenue').innerText = totalRevenue.toFixed(2) + " BDT";
                document.getElementById('totalSavings').innerText = totalSaved.toFixed(2) + " BDT";
                document.getElementById('entryCount').innerText = history.length;
                document.getElementById('roiValue').innerText = netROI.toFixed(1) + "%";
            } else {
                tableBody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">No entries found. Start scanning items to see data!</td></tr>';
            }
        }

        // Run the function when the page opens
        window.onload = loadLedger;
    </script>
</body>
</html>
